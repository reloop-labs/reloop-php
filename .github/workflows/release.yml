name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: meta
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('composer.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "archive=reloop-php-$VERSION-source.zip" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches composer.json
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="${{ steps.meta.outputs.version }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match composer.json version $PKG_VERSION"
            exit 1
          fi

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - name: Install, test, and validate
        run: |
          composer validate --strict
          composer install --prefer-dist --no-progress
          vendor/bin/phpunit

      - name: Create source archive
        run: |
          zip -r "${{ steps.meta.outputs.archive }}" . \
            -x '*.git*' 'vendor/*' '.github/*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Reloop PHP SDK ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
